<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This site is currently under construction as ICU Media Design prepares a new online home. Check back soon for our full range of services.">

    <title>Site Under Construction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
        }

        .progress-bar {
            width: 200px;
            height: 10px;
            background-color: #ddd;
            border-radius: 5px;
            margin: 2rem auto;
            overflow: hidden;
        }

        .progress {
            width: 50%;
            height: 100%;
            background-color: #4CAF50;
            animation: progress 1.5s ease-in-out infinite;
        }

        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏗️</div>
        <h1>Under Construction</h1>
        <p>We're working hard to bring you something amazing! Our website is currently under construction, but we'll be back soon with a brand new look.</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <p>Thank you for your patience!</p>
    </div>
</body>
</html>
